document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"bd47bc62-2efb-4c6f-9ad7-0f1e89bb78b0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{background:#000;font-family:\"DM Sans\",-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;-webkit-font-smoothing:antialiased}\n  @keyframes rp-glow{0%,100%{opacity:.55}50%{opacity:.9}}\n<\u002Fstyle>\n<script type=\"application/ld+json\">\n{\"@context\":\"https://schema.org\",\"@type\":\"NewsArticle\",\"headline\":\"RepPrep.ai Launches Scout: A Multi-Agent AI Co-Pilot for Medical Sales Reps\",\"description\":\"RepPrep.ai has launched Scout, a first-of-its-kind multi-agent conversational AI that unifies a medical sales rep's CRM, literature, and territory data into one experience and automates pre-call planning end to end.\",\"datePublished\":\"[PUBLISH DATE e.g. 2026-07-04]\",\"dateModified\":\"[PUBLISH DATE e.g. 2026-07-04]\",\"author\":{\"@type\":\"Organization\",\"name\":\"RepPrep.ai\",\"url\":\"https://www.repprep.ai\"},\"publisher\":{\"@type\":\"Organization\",\"name\":\"RepPrep.ai\",\"logo\":{\"@type\":\"ImageObject\",\"url\":\"https://www.repprep.ai/images/rp_logo.png\"}},\"mainEntityOfPage\":{\"@type\":\"WebPage\",\"@id\":\"https://www.repprep.ai/blog/introducing-scout\"}}\n<\u002Fscript>\n<script type=\"application/ld+json\">\n{\"@context\":\"https://schema.org\",\"@type\":\"FAQPage\",\"mainEntity\":[{\"@type\":\"Question\",\"name\":\"What is Scout by RepPrep.ai?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Scout is a multi-agent conversational AI built for medical sales representatives. It sits on top of RepPrep.ai and unifies a rep's CRM, literature databases, and territory and product data into a single conversational experience, automating pre-call planning and much of the sales process from start to finish.\"}},{\"@type\":\"Question\",\"name\":\"Who is Scout for?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Scout is built for medical sales representatives who sell to physicians, including medical device, diagnostics, biologics, and pharmaceutical reps. It supports individual reps, distributor teams, and enterprise sales organizations.\"}},{\"@type\":\"Question\",\"name\":\"How is Scout different from other medical sales tools?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Most medical sales software requires reps to work across separate dashboards, filters, and disconnected tools. Scout replaces that with a single conversation. It learns each rep's patterns, territory, and product portfolio, and integrates directly with the rep's existing CRM and literature sources rather than adding another silo.\"}},{\"@type\":\"Question\",\"name\":\"Does Scout work with existing CRM systems?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes. Scout is designed to integrate with a rep's existing MedTech stack, including CRM systems and medical literature databases, so it fits into current workflows instead of replacing them.\"}},{\"@type\":\"Question\",\"name\":\"Can reps use Scout while driving or during meetings?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes. Because Scout is conversational, reps can hold hands-free conversations with it while driving between accounts and update notes in real time, including during or immediately after a meeting with a physician. This lets reps make productive use of travel time and capture call details while they are still fresh.\"}}]}\n<\u002Fscript>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Scout Announcement\" style=\"background:#000;color:#e6e9ee;min-height:100vh;line-height:1.65;font-size:17px\">\n\n  <nav style=\"position:sticky;top:0;z-index:20;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between\">\n      <a href=\"https://www.repprep.ai\" style=\"display:flex;align-items:center\"><img src=\"f059fba5-8f80-40bf-816b-fcd418636aeb\" alt=\"RepPrep.ai\" style=\"height:24px;width:auto;display:block\"><\u002Fa>\n      <a href=\"https://app.repprep.ai/signin\" style=\"background:var(--accent,#2f6bff);color:#fff;text-decoration:none;font-size:13.5px;font-weight:700;padding:10px 20px;border-radius:10px\" style-hover=\"background:#5c8dff\">Try Scout<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <div style=\"max-width:760px;margin:0 auto;padding:0 24px\">\n\n    <header style=\"padding:72px 0 44px;border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#2f6bff);margin-bottom:22px\">Product Announcement<\u002Fdiv>\n      <h1 style=\"font-size:44px;line-height:1.12;letter-spacing:-.03em;font-weight:800;color:#fff;margin-bottom:24px;text-wrap:balance\">Introducing Scout: the AI co-pilot that turns a rep's entire sales stack into one conversation<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.55;color:#9aa3b0;font-weight:500\">RepPrep.ai today launched Scout, a first-of-its-kind multi-agent conversational AI that learns a medical sales rep's patterns, territory, and product portfolio, then unifies their CRM, literature, and data into a single experience that automates pre-call planning from start to finish.<\u002Fp>\n      <div style=\"margin-top:28px;display:flex;gap:14px;align-items:center;font-size:13.5px;color:#6b7686\">\n        <span style=\"font-weight:600;color:#cfd5dd\">RepPrep.ai<\u002Fspan>\n        <span style=\"width:3px;height:3px;border-radius:50%;background:#4b5563\"><\u002Fspan>\n        <span>[PUBLISH DATE]<\u002Fspan>\n        <span style=\"width:3px;height:3px;border-radius:50%;background:#4b5563\"><\u002Fspan>\n        <span>4 min read<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <article style=\"padding:44px 0 20px\">\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Medical sales reps have never had more data available to them, and never had less time to use it. Between a CRM, claims and territory data, product literature, and physician research, the information a rep needs before a single call is scattered across a dozen disconnected tools. Preparing well means stitching it all together by hand. Most reps simply don't have the hours.<\u002Fp>\n\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Today, RepPrep.ai is changing that with the launch of <strong style=\"color:#fff;font-weight:700\">Scout<\u002Fstrong> — a multi-agent conversational AI that does the stitching for you. Instead of jumping between dashboards and filters, a rep just talks to Scout, and it pulls their whole stack into one place to plan calls, surface the right research, and move the busywork off their plate.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:34px 0\">\n        <div style=\"background:#0c0f15;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:24px 22px\">\n          <img src=\"499cea25-96fb-4d3c-a779-83ff33616fdf\" alt=\"\" style=\"width:30px;height:30px;display:block;margin-bottom:16px\">\n          <div style=\"font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--accent,#2f6bff);margin-bottom:6px\">Communicate<\u002Fdiv>\n          <div style=\"font-size:14px;color:#9aa3b0;line-height:1.5\">Ask Scout in plain language instead of navigating tools.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0c0f15;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:24px 22px\">\n          <img src=\"305ad03d-f4d6-4ff3-bdf7-20cbb5590431\" alt=\"\" style=\"width:30px;height:30px;display:block;margin-bottom:16px\">\n          <div style=\"font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--accent,#2f6bff);margin-bottom:6px\">Expedite<\u002Fdiv>\n          <div style=\"font-size:14px;color:#9aa3b0;line-height:1.5\">Unify CRM, literature, and territory data in one place.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0c0f15;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:24px 22px\">\n          <img src=\"6080fa1f-adca-4c07-ba66-a5219113b6d3\" alt=\"\" style=\"width:30px;height:30px;display:block;margin-bottom:16px\">\n          <div style=\"font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--accent,#2f6bff);margin-bottom:6px\">Execute<\u002Fdiv>\n          <div style=\"font-size:14px;color:#9aa3b0;line-height:1.5\">Automate the sales process from start to finish.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-size:28px;line-height:1.22;letter-spacing:-.025em;font-weight:800;color:#fff;margin:46px 0 16px\">What Scout actually does<\u002Fh2>\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Scout sits on top of everything RepPrep.ai already offers. Where RepPrep gives reps AI-powered pre-call plans on any U.S. physician, Scout adds a conversational layer that learns how each rep works and takes on more of the process itself. In practice, that means a rep can:<\u002Fp>\n      <ul style=\"list-style:none;margin:0 0 22px;padding:0;display:flex;flex-direction:column;gap:13px\">\n        <li style=\"display:flex;gap:13px;align-items:flex-start;color:#c2cad4\"><span style=\"flex:none;margin-top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff)\"><\u002Fspan><span>Ask Scout to prepare for an upcoming call, and get a tailored plan without running the searches themselves.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:13px;align-items:flex-start;color:#c2cad4\"><span style=\"flex:none;margin-top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff)\"><\u002Fspan><span>Hold a full, hands-free conversation with Scout while driving between accounts, turning windshield time into prep time.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:13px;align-items:flex-start;color:#c2cad4\"><span style=\"flex:none;margin-top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff)\"><\u002Fspan><span>Pull the relevant claims data, procedures, and published research on a physician into a single view.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:13px;align-items:flex-start;color:#c2cad4\"><span style=\"flex:none;margin-top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff)\"><\u002Fspan><span>Update notes and log call details in real time, even in the middle of a meeting with a physician.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:13px;align-items:flex-start;color:#c2cad4\"><span style=\"flex:none;margin-top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff)\"><\u002Fspan><span>Connect their existing CRM and literature databases so Scout works inside their current workflow.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:13px;align-items:flex-start;color:#c2cad4\"><span style=\"flex:none;margin-top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff)\"><\u002Fspan><span>Let Scout learn their territory and product portfolio over time, so its guidance gets sharper with use.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Because Scout is conversational, it also unlocks the parts of a rep's day that were previously dead time. A rep can talk through their next account with Scout hands-free on the drive between hospitals, catch up on notes from the parking lot, or quietly log what was said in the moments right after a physician meeting, while it's still fresh. The hours reps spend in the car or between cases stop being lost time and start being some of the most productive parts of the day.<\u002Fp>\n\n      <p style=\"margin-bottom:22px;color:#c2cad4\">The result is less time spent assembling information and more time spent on the parts of the job that actually close business: building relationships and being genuinely prepared in front of a physician.<\u002Fp>\n\n      <div style=\"background:#0c0f15;border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:28px 30px;margin:36px 0\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--accent,#2f6bff);margin-bottom:10px\">Why it matters<\u002Fdiv>\n        <p style=\"margin:0;font-size:16px;color:#cfd5dd;line-height:1.6\">Most MedTech software was built for companies and sold at the enterprise level, leaving individual reps with tools that were expensive, generic, or disconnected from how they actually sell. Scout continues RepPrep's founding principle: build the best tool for the rep, not just the organization above them.<\u002Fp>\n      <\u002Fdiv>\n\n      <h2 style=\"font-size:28px;line-height:1.22;letter-spacing:-.025em;font-weight:800;color:#fff;margin:46px 0 16px\">Built for how reps actually sell<\u002Fh2>\n      <p style=\"margin-bottom:22px;color:#c2cad4\">RepPrep.ai was founded by former medical sales reps who ran into the same problem every week: the data was there, but it was too dense, too disconnected, and too slow to use in the field. Scout is the next step in solving that — not another dashboard to check, but a co-pilot that removes the busywork between a rep and their next conversation.<\u002Fp>\n\n      <sc-if value=\"{{ showFounderQuote }}\" hint-placeholder-val=\"{{ true }}\">\n      <blockquote style=\"margin:32px 0;padding:6px 0 6px 26px;border-left:3px solid var(--accent,#2f6bff);font-size:20px;line-height:1.5;font-weight:500;color:#eef1f5\">\n        \"[PLACEHOLDER QUOTE — for founder approval] Reps didn't need one more tool to log into. They needed everything to finally work together. Scout is what happens when you stop making reps do the software's job — it learns how you sell and handles the rest, so you can focus on the physician in front of you.\"\n        <span style=\"display:block;margin-top:14px;font-size:14px;font-weight:600;color:#9aa3b0\">[Founder Name], Co-Founder <span style=\"font-weight:400;color:#6b7686\">· RepPrep.ai<\u002Fspan><\u002Fspan>\n      <\u002Fblockquote>\n      <\u002Fsc-if>\n\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Because Scout integrates with a rep's existing CRM and literature sources rather than replacing them, it fits into current workflows instead of adding another silo. For sales leaders, that means a field force preparing the same way, with consistent messaging, and ramping faster — without forcing a rip-and-replace of the tools their teams already rely on.<\u002Fp>\n\n      <sc-if value=\"{{ showImage }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:repeating-linear-gradient(45deg,#0b0e14,#0b0e14 12px,#10141c 12px,#10141c 24px);border:1px dashed rgba(255,255,255,.14);border-radius:16px;padding:64px 24px;text-align:center;color:#6b7686;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.02em;margin:34px 0\">[ Scout product screenshot or short demo clip goes here ]<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <h2 style=\"font-size:28px;line-height:1.22;letter-spacing:-.025em;font-weight:800;color:#fff;margin:46px 0 16px\">Who Scout is for<\u002Fh2>\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Scout is designed for any medical sales professional who sells to a physician — across medical devices, diagnostics, biologics, and pharmaceuticals. It supports individual reps looking for an edge, distributor teams that need consistency across their field force, and enterprise sales organizations standardizing how every rep prepares.<\u002Fp>\n\n      <h2 style=\"font-size:28px;line-height:1.22;letter-spacing:-.025em;font-weight:800;color:#fff;margin:46px 0 16px\">Availability<\u002Fh2>\n      <p style=\"margin-bottom:22px;color:#c2cad4\">Scout is available now to RepPrep.ai users. [CONFIRM AVAILABILITY / PRICING LINE — e.g. included for existing subscribers, or available as an add-on.] Reps new to RepPrep can get started for free and try Scout without a demo.<\u002Fp>\n\n      <div id=\"try\" style=\"position:relative;overflow:hidden;background:#08090d;border:1px solid rgba(47,107,255,.35);border-radius:20px;padding:48px 40px;margin:48px 0 24px;text-align:center\">\n        <div style=\"position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:420px;height:260px;background:radial-gradient(closest-side,rgba(47,107,255,.5),transparent 70%);filter:blur(20px);animation:rp-glow 6s ease-in-out infinite;pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:relative\">\n          <h2 style=\"font-size:28px;font-weight:800;letter-spacing:-.025em;margin-bottom:12px;color:#fff\">Meet Scout<\u002Fh2>\n          <p style=\"color:#9aa3b0;font-size:16px;margin-bottom:26px\">See what happens when your entire sales stack becomes one conversation.<\u002Fp>\n          <a href=\"https://app.repprep.ai/signin\" style=\"display:inline-block;background:var(--accent,#2f6bff);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:15px 32px;border-radius:12px\" style-hover=\"background:#5c8dff\">Try Scout today<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid rgba(255,255,255,.08);margin-top:24px;padding:34px 0 60px;font-size:14.5px;color:#9aa3b0\">\n        <div style=\"font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#6b7686;margin-bottom:12px;font-weight:700\">About RepPrep.ai<\u002Fdiv>\n        <p style=\"margin-bottom:14px;line-height:1.65\">RepPrep.ai is an AI platform built by medical sales reps, for medical sales reps. It transforms dense, disconnected healthcare data into clear, actionable pre-call planning and targeting, helping reps across medical devices, diagnostics, biologics, and pharmaceuticals prepare faster, sell smarter, and close more. With the launch of Scout, RepPrep.ai is unifying the entire MedTech sales stack into a single conversational experience.<\u002Fp>\n        <p style=\"margin:0;line-height:1.65\">Learn more at <a href=\"https://www.repprep.ai\" style=\"color:var(--accent,#2f6bff);text-decoration:none\">www.repprep.ai<\u002Fa>. For media inquiries, contact <a href=\"mailto:info@repprep.ai\" style=\"color:var(--accent,#2f6bff);text-decoration:none\">info@repprep.ai<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n\n  <footer style=\"border-top:1px solid rgba(255,255,255,.08);padding:26px 0\">\n    <div style=\"max-width:760px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center;font-size:13px;color:#6b7686\">\n      <img src=\"f059fba5-8f80-40bf-816b-fcd418636aeb\" alt=\"RepPrep.ai\" style=\"height:20px;width:auto;display:block;opacity:.85\">\n      <div>© 2026 RepPrep.ai · Made by reps, for reps.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2f6bff&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2f6bff&quot;,&quot;#0057e3&quot;,&quot;#0a84ff&quot;,&quot;#3b82f6&quot;],&quot;section&quot;:&quot;Brand&quot;},&quot;showFounderQuote&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;showImage&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const a = this.props.accentColor;\n    if (a) {\n      let s = document.getElementById('rp-accent-var');\n      if (!s) { s = document.createElement('style'); s.id = 'rp-accent-var'; document.head.appendChild(s); }\n      s.textContent = ':root{--accent:' + a + '}';\n    }\n  }\n  renderVals() {\n    return {\n      showFounderQuote: this.props.showFounderQuote ?? true,\n      showImage: this.props.showImage ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
